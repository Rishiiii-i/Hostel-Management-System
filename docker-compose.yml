version: '3.8'

services:
  # ----------------------------------------------------------------------------
  # MongoDB Database Service
  # ----------------------------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: hostel_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------------------------
  # Node.js Backend API Service
  # ----------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hostel_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-smart-hostel-secret-key-12345}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/hostel-management}
      - FIREBASE_SERVICE_ACCOUNT_PATH=serviceAccountKey.json
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ----------------------------------------------------------------------------
  # Frontend Nginx SPA Web Service
  # ----------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hostel_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

# ------------------------------------------------------------------------------
# Persisted Data Volumes & Private Networks
# ------------------------------------------------------------------------------
volumes:
  mongodb_data:
    driver: local

networks:
  app-network:
    driver: bridge
